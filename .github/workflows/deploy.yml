name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ vars.AZURE_RESOURCE_GROUP }}
          containerAppName: ${{ vars.AZURE_CONTAINER_APP_NAME }}
          imageToDeploy: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          environmentVariables: >-
            DATABASE_URL=secretref:database-url
            REDIS_HOST=secretref:redis-host
            REDIS_PORT=secretref:redis-port
            REDIS_PASSWORD=secretref:redis-password
            JWT_SECRET=secretref:jwt-secret
            ENCRYPTION_KEY=secretref:encryption-key
            FSP_API_BASE_URL=${{ vars.FSP_API_BASE_URL }}
            FSP_CORE_BASE_URL=${{ vars.FSP_CORE_BASE_URL }}
            FSP_CURRICULUM_BASE_URL=${{ vars.FSP_CURRICULUM_BASE_URL }}
            FSP_SUBSCRIPTION_KEY=secretref:fsp-subscription-key
            OPEN_ROUTER_API_KEY=secretref:open-router-api-key
            OPEN_ROUTER_MODEL=${{ vars.OPEN_ROUTER_MODEL }}
            NODE_ENV=production
            LOG_LEVEL=info
