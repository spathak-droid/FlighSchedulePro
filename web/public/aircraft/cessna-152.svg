<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg152" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3d2e"/>
      <stop offset="100%" stop-color="#0d1f17"/>
    </linearGradient>
    <linearGradient id="accent152" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4eda8a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#2bb86a" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="250" rx="8" fill="url(#bg152)"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="200" x2="400" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="160" x2="400" y2="160" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <!-- Aircraft silhouette - smaller Cessna 152 -->
  <g transform="translate(200,125)" fill="url(#accent152)">
    <!-- Fuselage (smaller than 172) -->
    <ellipse cx="0" cy="8" rx="58" ry="8" fill="#4eda8a" fill-opacity="0.7"/>
    <path d="M-58,8 Q-62,5 -60,0 L50,0 Q60,0 58,8 Z" fill="#5eeaa0" fill-opacity="0.6"/>
    <!-- Nose -->
    <path d="M50,0 Q68,-2 72,4 Q68,10 50,8 Z" fill="#4eda8a" fill-opacity="0.8"/>
    <!-- Propeller -->
    <rect x="70" y="-12" width="3" height="10" rx="1" fill="#7cf0b8" fill-opacity="0.6"/>
    <rect x="70" y="8" width="3" height="10" rx="1" fill="#7cf0b8" fill-opacity="0.6"/>
    <!-- High wing (shorter span) -->
    <rect x="-45" y="-6" width="100" height="5" rx="2" fill="#5eeaa0" fill-opacity="0.75"/>
    <!-- Wing struts -->
    <line x1="-15" y1="-1" x2="-22" y2="4" stroke="#4eda8a" stroke-opacity="0.5" stroke-width="1.5"/>
    <line x1="15" y1="-1" x2="22" y2="4" stroke="#4eda8a" stroke-opacity="0.5" stroke-width="1.5"/>
    <!-- Tail -->
    <path d="M-58,4 L-76,-10 L-67,-10 L-54,0 Z" fill="#5eeaa0" fill-opacity="0.6"/>
    <!-- Horizontal stabilizer -->
    <rect x="-74" y="2" width="25" height="3.5" rx="1" fill="#4eda8a" fill-opacity="0.6"/>
    <!-- Landing gear (fixed) -->
    <line x1="24" y1="14" x2="24" y2="24" stroke="#4eda8a" stroke-opacity="0.5" stroke-width="2"/>
    <line x1="-8" y1="14" x2="-8" y2="24" stroke="#4eda8a" stroke-opacity="0.5" stroke-width="2"/>
    <circle cx="24" cy="26" r="2.5" fill="#4eda8a" fill-opacity="0.5"/>
    <circle cx="-8" cy="26" r="2.5" fill="#4eda8a" fill-opacity="0.5"/>
  </g>
  <!-- Text label -->
  <text x="200" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#4eda8a" fill-opacity="0.5" letter-spacing="3">CESSNA 152</text>
  <!-- Corner accent -->
  <rect x="16" y="16" width="24" height="3" rx="1.5" fill="#4eda8a" fill-opacity="0.3"/>
  <rect x="16" y="16" width="3" height="24" rx="1.5" fill="#4eda8a" fill-opacity="0.3"/>
  <rect x="360" y="231" width="24" height="3" rx="1.5" fill="#4eda8a" fill-opacity="0.3"/>
  <rect x="381" y="210" width="3" height="24" rx="1.5" fill="#4eda8a" fill-opacity="0.3"/>
</svg>
