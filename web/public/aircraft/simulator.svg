<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bgSim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4d2e0a"/>
      <stop offset="100%" stop-color="#281806"/>
    </linearGradient>
    <linearGradient id="accentSim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#da8a2e" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#b86820" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3d5f"/>
      <stop offset="100%" stop-color="#0d2040"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="250" rx="8" fill="url(#bgSim)"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="200" x2="400" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="160" x2="400" y2="160" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <!-- Simulator booth silhouette -->
  <g transform="translate(200,120)">
    <!-- Base platform -->
    <rect x="-60" y="40" width="120" height="8" rx="3" fill="#da8a2e" fill-opacity="0.5"/>
    <!-- Hydraulic legs -->
    <line x1="-40" y1="40" x2="-50" y2="60" stroke="#da8a2e" stroke-opacity="0.4" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="40" x2="50" y2="60" stroke="#da8a2e" stroke-opacity="0.4" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="44" x2="0" y2="62" stroke="#da8a2e" stroke-opacity="0.4" stroke-width="3" stroke-linecap="round"/>
    <!-- Floor base -->
    <rect x="-65" y="60" width="130" height="5" rx="2" fill="#da8a2e" fill-opacity="0.35"/>
    <!-- Main cockpit enclosure -->
    <path d="M-55,40 L-55,-20 Q-55,-35 -40,-35 L40,-35 Q55,-35 55,-20 L55,40 Z" fill="#da8a2e" fill-opacity="0.3" stroke="#da8a2e" stroke-opacity="0.4" stroke-width="1.5"/>
    <!-- Display screens (triple) -->
    <rect x="-42" y="-25" width="26" height="18" rx="2" fill="url(#screen)" stroke="#4a9eda" stroke-opacity="0.3" stroke-width="0.5"/>
    <rect x="-13" y="-25" width="26" height="18" rx="2" fill="url(#screen)" stroke="#4a9eda" stroke-opacity="0.3" stroke-width="0.5"/>
    <rect x="16" y="-25" width="26" height="18" rx="2" fill="url(#screen)" stroke="#4a9eda" stroke-opacity="0.3" stroke-width="0.5"/>
    <!-- Screen glow -->
    <rect x="-42" y="-25" width="26" height="18" rx="2" fill="#4a9eda" fill-opacity="0.08"/>
    <rect x="-13" y="-25" width="26" height="18" rx="2" fill="#4a9eda" fill-opacity="0.08"/>
    <rect x="16" y="-25" width="26" height="18" rx="2" fill="#4a9eda" fill-opacity="0.08"/>
    <!-- Control panel / dashboard -->
    <rect x="-45" y="0" width="90" height="12" rx="2" fill="#da8a2e" fill-opacity="0.25"/>
    <!-- Control yoke -->
    <circle cx="0" cy="6" r="5" fill="none" stroke="#da8a2e" stroke-opacity="0.5" stroke-width="1.5"/>
    <line x1="0" y1="11" x2="0" y2="18" stroke="#da8a2e" stroke-opacity="0.4" stroke-width="1.5"/>
    <!-- Toggle switches on panel -->
    <circle cx="-25" cy="5" r="1.5" fill="#da8a2e" fill-opacity="0.5"/>
    <circle cx="-18" cy="5" r="1.5" fill="#4eda8a" fill-opacity="0.4"/>
    <circle cx="18" cy="5" r="1.5" fill="#da8a2e" fill-opacity="0.5"/>
    <circle cx="25" cy="5" r="1.5" fill="#da4a4a" fill-opacity="0.4"/>
    <!-- Seat -->
    <rect x="-12" y="18" width="24" height="18" rx="3" fill="#da8a2e" fill-opacity="0.2"/>
    <rect x="-14" y="14" width="28" height="6" rx="2" fill="#da8a2e" fill-opacity="0.25"/>
  </g>
  <!-- Text label -->
  <text x="200" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#da8a2e" fill-opacity="0.5" letter-spacing="3">REDBIRD FMX</text>
  <!-- Corner accent -->
  <rect x="16" y="16" width="24" height="3" rx="1.5" fill="#da8a2e" fill-opacity="0.3"/>
  <rect x="16" y="16" width="3" height="24" rx="1.5" fill="#da8a2e" fill-opacity="0.3"/>
  <rect x="360" y="231" width="24" height="3" rx="1.5" fill="#da8a2e" fill-opacity="0.3"/>
  <rect x="381" y="210" width="3" height="24" rx="1.5" fill="#da8a2e" fill-opacity="0.3"/>
</svg>
