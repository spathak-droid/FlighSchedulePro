<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bgDef" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2d33"/>
      <stop offset="100%" stop-color="#16181c"/>
    </linearGradient>
    <linearGradient id="accentDef" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8a8f9a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6b7080" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="250" rx="8" fill="url(#bgDef)"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="200" x2="400" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="160" x2="400" y2="160" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <!-- Generic aircraft silhouette -->
  <g transform="translate(200,125)" fill="url(#accentDef)">
    <!-- Fuselage -->
    <ellipse cx="0" cy="8" rx="65" ry="9" fill="#8a8f9a" fill-opacity="0.7"/>
    <path d="M-65,8 Q-70,5 -67,0 L55,0 Q67,0 65,8 Z" fill="#9aa0aa" fill-opacity="0.6"/>
    <!-- Nose -->
    <path d="M55,0 Q75,-2 80,4 Q75,10 55,8 Z" fill="#8a8f9a" fill-opacity="0.8"/>
    <!-- Propeller -->
    <rect x="78" y="-13" width="3" height="11" rx="1" fill="#b0b5c0" fill-opacity="0.6"/>
    <rect x="78" y="9" width="3" height="11" rx="1" fill="#b0b5c0" fill-opacity="0.6"/>
    <!-- High wing -->
    <rect x="-50" y="-7" width="110" height="5.5" rx="2" fill="#9aa0aa" fill-opacity="0.75"/>
    <!-- Wing struts -->
    <line x1="-18" y1="-1.5" x2="-26" y2="4" stroke="#8a8f9a" stroke-opacity="0.5" stroke-width="1.5"/>
    <line x1="18" y1="-1.5" x2="26" y2="4" stroke="#8a8f9a" stroke-opacity="0.5" stroke-width="1.5"/>
    <!-- Tail -->
    <path d="M-65,4 L-85,-11 L-76,-11 L-61,0 Z" fill="#9aa0aa" fill-opacity="0.6"/>
    <!-- Horizontal stabilizer -->
    <rect x="-83" y="2" width="28" height="3.5" rx="1" fill="#8a8f9a" fill-opacity="0.6"/>
    <!-- Landing gear -->
    <line x1="28" y1="15" x2="28" y2="26" stroke="#8a8f9a" stroke-opacity="0.5" stroke-width="2"/>
    <line x1="-8" y1="15" x2="-8" y2="26" stroke="#8a8f9a" stroke-opacity="0.5" stroke-width="2"/>
    <circle cx="28" cy="28" r="2.5" fill="#8a8f9a" fill-opacity="0.5"/>
    <circle cx="-8" cy="28" r="2.5" fill="#8a8f9a" fill-opacity="0.5"/>
  </g>
  <!-- Text label -->
  <text x="200" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#8a8f9a" fill-opacity="0.5" letter-spacing="3">AIRCRAFT</text>
  <!-- Corner accent -->
  <rect x="16" y="16" width="24" height="3" rx="1.5" fill="#8a8f9a" fill-opacity="0.3"/>
  <rect x="16" y="16" width="3" height="24" rx="1.5" fill="#8a8f9a" fill-opacity="0.3"/>
  <rect x="360" y="231" width="24" height="3" rx="1.5" fill="#8a8f9a" fill-opacity="0.3"/>
  <rect x="381" y="210" width="3" height="24" rx="1.5" fill="#8a8f9a" fill-opacity="0.3"/>
</svg>
