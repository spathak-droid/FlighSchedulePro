<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg182" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e1a4d"/>
      <stop offset="100%" stop-color="#170d28"/>
    </linearGradient>
    <linearGradient id="accent182" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a864da" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8040b8" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="250" rx="8" fill="url(#bg182)"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="200" x2="400" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="160" x2="400" y2="160" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <!-- Aircraft silhouette - Cessna 182RG (retractable gear) -->
  <g transform="translate(200,125)" fill="url(#accent182)">
    <!-- Fuselage (slightly larger/stockier than 172) -->
    <ellipse cx="0" cy="8" rx="72" ry="11" fill="#a864da" fill-opacity="0.7"/>
    <path d="M-72,8 Q-77,5 -74,0 L62,0 Q74,0 72,8 Z" fill="#b87ae8" fill-opacity="0.6"/>
    <!-- Nose (beefier engine cowl) -->
    <path d="M62,0 Q84,-3 88,4 Q84,12 62,8 Z" fill="#a864da" fill-opacity="0.8"/>
    <!-- Propeller -->
    <rect x="86" y="-16" width="3" height="14" rx="1" fill="#c898f0" fill-opacity="0.6"/>
    <rect x="86" y="10" width="3" height="14" rx="1" fill="#c898f0" fill-opacity="0.6"/>
    <!-- High wing (wider span) -->
    <rect x="-60" y="-8" width="128" height="6" rx="2" fill="#b87ae8" fill-opacity="0.75"/>
    <!-- Wing struts -->
    <line x1="-22" y1="-2" x2="-32" y2="4" stroke="#a864da" stroke-opacity="0.5" stroke-width="1.5"/>
    <line x1="22" y1="-2" x2="32" y2="4" stroke="#a864da" stroke-opacity="0.5" stroke-width="1.5"/>
    <!-- Tail -->
    <path d="M-72,4 L-94,-14 L-84,-14 L-68,0 Z" fill="#b87ae8" fill-opacity="0.6"/>
    <!-- Horizontal stabilizer -->
    <rect x="-92" y="2" width="32" height="4" rx="1" fill="#a864da" fill-opacity="0.6"/>
    <!-- Retractable gear (tucked up, dashed to show retracted) -->
    <line x1="30" y1="16" x2="30" y2="22" stroke="#a864da" stroke-opacity="0.3" stroke-width="1.5" stroke-dasharray="2,2"/>
    <line x1="-10" y1="16" x2="-10" y2="22" stroke="#a864da" stroke-opacity="0.3" stroke-width="1.5" stroke-dasharray="2,2"/>
    <!-- RG badge -->
    <rect x="42" y="12" width="18" height="10" rx="2" fill="#a864da" fill-opacity="0.3"/>
    <text x="51" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#c898f0" fill-opacity="0.7">RG</text>
  </g>
  <!-- Text label -->
  <text x="200" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#a864da" fill-opacity="0.5" letter-spacing="3">CESSNA 182RG</text>
  <!-- Corner accent -->
  <rect x="16" y="16" width="24" height="3" rx="1.5" fill="#a864da" fill-opacity="0.3"/>
  <rect x="16" y="16" width="3" height="24" rx="1.5" fill="#a864da" fill-opacity="0.3"/>
  <rect x="360" y="231" width="24" height="3" rx="1.5" fill="#a864da" fill-opacity="0.3"/>
  <rect x="381" y="210" width="3" height="24" rx="1.5" fill="#a864da" fill-opacity="0.3"/>
</svg>
