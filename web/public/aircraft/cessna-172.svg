<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg172" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0d1f33"/>
    </linearGradient>
    <linearGradient id="accent172" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a9eda" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#2b7cb8" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="250" rx="8" fill="url(#bg172)"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="200" x2="400" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="160" x2="400" y2="160" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <!-- Aircraft silhouette - high-wing Cessna 172 -->
  <g transform="translate(200,125)" fill="url(#accent172)">
    <!-- Fuselage -->
    <ellipse cx="0" cy="8" rx="70" ry="10" fill="#4a9eda" fill-opacity="0.7"/>
    <path d="M-70,8 Q-75,5 -72,0 L60,0 Q72,0 70,8 Z" fill="#5aaeea" fill-opacity="0.6"/>
    <!-- Nose -->
    <path d="M60,0 Q80,-2 85,4 Q80,10 60,8 Z" fill="#4a9eda" fill-opacity="0.8"/>
    <!-- Propeller -->
    <rect x="83" y="-14" width="3" height="12" rx="1" fill="#7cc4f0" fill-opacity="0.6"/>
    <rect x="83" y="10" width="3" height="12" rx="1" fill="#7cc4f0" fill-opacity="0.6"/>
    <!-- High wing -->
    <rect x="-55" y="-8" width="120" height="6" rx="2" fill="#5aaeea" fill-opacity="0.75"/>
    <!-- Wing struts -->
    <line x1="-20" y1="-2" x2="-30" y2="4" stroke="#4a9eda" stroke-opacity="0.5" stroke-width="1.5"/>
    <line x1="20" y1="-2" x2="30" y2="4" stroke="#4a9eda" stroke-opacity="0.5" stroke-width="1.5"/>
    <!-- Tail -->
    <path d="M-70,4 L-90,-12 L-80,-12 L-65,0 Z" fill="#5aaeea" fill-opacity="0.6"/>
    <!-- Horizontal stabilizer -->
    <rect x="-88" y="2" width="30" height="4" rx="1" fill="#4a9eda" fill-opacity="0.6"/>
    <!-- Landing gear -->
    <line x1="30" y1="16" x2="30" y2="28" stroke="#4a9eda" stroke-opacity="0.5" stroke-width="2"/>
    <line x1="-10" y1="16" x2="-10" y2="28" stroke="#4a9eda" stroke-opacity="0.5" stroke-width="2"/>
    <circle cx="30" cy="30" r="3" fill="#4a9eda" fill-opacity="0.5"/>
    <circle cx="-10" cy="30" r="3" fill="#4a9eda" fill-opacity="0.5"/>
  </g>
  <!-- Text label -->
  <text x="200" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#4a9eda" fill-opacity="0.5" letter-spacing="3">CESSNA 172S</text>
  <!-- Corner accent -->
  <rect x="16" y="16" width="24" height="3" rx="1.5" fill="#4a9eda" fill-opacity="0.3"/>
  <rect x="16" y="16" width="3" height="24" rx="1.5" fill="#4a9eda" fill-opacity="0.3"/>
  <rect x="360" y="231" width="24" height="3" rx="1.5" fill="#4a9eda" fill-opacity="0.3"/>
  <rect x="381" y="210" width="3" height="24" rx="1.5" fill="#4a9eda" fill-opacity="0.3"/>
</svg>
